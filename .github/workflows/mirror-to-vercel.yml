# Mirror `main` → the Vercel-connected deploy repo, so a merge to main
# auto-publishes to Vercel. Replicates kloser's deployment model.
#
# Why a mirror (not Vercel's Git integration on THIS repo): Vercel Hobby only
# deploys commits whose author email is on the connected GitHub account. The
# commit in vytal-fit/vytal-fit is authored by the engineer who pushed, which
# Vercel rejects ("commit author does not have contributing access"). So we
# don't push HEAD verbatim — we synthesise a fresh orphan commit that points at
# HEAD's *tree* but is authored by the deploy identity, and force-push that to
# the deploy repo's `main`. Vercel then builds and publishes.
#
# ── One-time setup ──────────────────────────────────────────────────────────
#   Deploy repo : vytalfiteu-web/vytalfit-eu-private (connected to Vercel)
#   Deploy email: vytal.fit.eu@gmail.com (the Vercel-connected GitHub account)
#   Only secret needed: VERCEL_DEPLOY_TOKEN — a fine-grained PAT created on the
#   vytalfit-eu GitHub account with, on vytalfit-eu-private:
#     Repository access → Only select repositories → vytalfit-eu-private
#     Permissions → Contents: Read and write + Workflows: Read and write
#   Add it here under Settings → Secrets and variables → Actions → New
#   repository secret → name VERCEL_DEPLOY_TOKEN.
# ────────────────────────────────────────────────────────────────────────────

name: Mirror to Vercel deploy repo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-to-vercel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  mirror:
    # Guard: only run from the canonical source repo. Without this, the deploy
    # repo would inherit this workflow on push and try to mirror into itself.
    if: github.repository == 'vytal-fit/vytal-fit'
    name: Force-push main to the deploy repo
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Do NOT persist GITHUB_TOKEN into .git/config — it's scoped to this
          # repo only and its extraheader would otherwise win over the PAT we
          # embed in the push URL for the deploy remote.
          persist-credentials: false

      - name: Mirror push
        env:
          DEPLOY_TOKEN: ${{ secrets.VERCEL_DEPLOY_TOKEN }}
          DEPLOY_REPO: vytalfiteu-web/vytalfit-eu-private
          DEPLOY_AUTHOR_EMAIL: vytal.fit.eu@gmail.com
        run: |
          set -euo pipefail

          if [ -z "${DEPLOY_TOKEN:-}" ]; then
            echo "::error::VERCEL_DEPLOY_TOKEN is empty. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

          TRIMMED=$(printf '%s' "$DEPLOY_TOKEN" | tr -d '[:space:]')

          # Pre-flight: can the token see the deploy repo?
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $TRIMMED" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${DEPLOY_REPO}")
          echo "::notice::Pre-flight: GET /repos/${DEPLOY_REPO} → HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::error::Token can't reach ${DEPLOY_REPO} (HTTP $STATUS). Check the PAT account, resource owner, and scopes."
            exit 1
          fi

          # Synthesise an orphan commit on HEAD's tree, authored by the deploy
          # identity (the one Vercel accepts).
          git config user.email "$DEPLOY_AUTHOR_EMAIL"
          git config user.name  "Vytal Deploy"

          SRC_SHA=$(git rev-parse --short HEAD)
          SRC_SUBJECT=$(git log -1 --pretty=%s HEAD)
          TREE=$(git rev-parse HEAD^{tree})
          NEW=$(git commit-tree "$TREE" -m "mirror from vytal-fit/vytal-fit@${SRC_SHA}: ${SRC_SUBJECT}")
          echo "::notice::Mirroring tree ${SRC_SHA} as ${NEW:0:7} authored by ${DEPLOY_AUTHOR_EMAIL}"

          # Inline the credential only at push time; never written to .git/config.
          git push --force "https://x-access-token:${TRIMMED}@github.com/${DEPLOY_REPO}.git" "${NEW}:refs/heads/main"
