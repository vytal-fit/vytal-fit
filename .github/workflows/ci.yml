name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx turbo type-check

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npm test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: ci

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vytal
          POSTGRES_PASSWORD: vytal
          POSTGRES_DB: vytal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vytal:vytal@localhost:5432/vytal
      BETTER_AUTH_SECRET: e2e-ci-secret-not-for-prod
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx --workspace @vytal-fit/web playwright install --with-deps

      - name: Run database migrations
        run: npm run db:migrate -w @vytal-fit/db

      - name: Seed demo data
        run: npm run db:seed -w @vytal-fit/db

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/e2e/html-report/
          retention-days: 14
