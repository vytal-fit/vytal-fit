# CI for the Vytal monorepo.
#
# Runs on every PR targeting `main` plus pushes to `main`. Cheap checks only —
# lint, type-check, unit tests — so we DON'T burn the free Actions minute
# budget. The Playwright E2E suite is deliberately NOT here; it runs on demand
# via `.github/workflows/e2e.yml` (workflow_dispatch).
#
# (A gitleaks secret-scan job can be added once a `.gitleaks.toml` allowlist
# exists — omitted for now to avoid false-positive CI failures.)
#
# Deployment is NOT done here either — see `mirror-to-vercel.yml`. Vercel
# builds and publishes from its connected deploy repo.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

# Cancel in-flight runs on the same branch when a new commit is pushed.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + install
        uses: ./.github/actions/setup

      # Order matters: cheap checks fail first.
      - name: Type-check
        run: npx turbo type-check

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npm test
