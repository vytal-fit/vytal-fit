# Playwright E2E — MANUAL ONLY.
#
# Moved off the CI pipeline (was in ci.yml) so the heavy Postgres + migrate +
# seed + Playwright run (~40 runner-minutes) doesn't drain the free Actions
# budget on every push/PR. Run it on demand from the Actions tab, or before a
# go-live / release, via "Run workflow".

name: E2E (manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 40

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: vytal
          POSTGRES_PASSWORD: vytal
          POSTGRES_DB: vytal
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://vytal:vytal@localhost:5432/vytal
      BETTER_AUTH_SECRET: e2e-ci-secret-not-for-prod
      BETTER_AUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node + install
        uses: ./.github/actions/setup

      - name: Install Playwright browsers
        run: npx --workspace @vytal-fit/pro playwright install --with-deps

      - name: Run database migrations
        run: npm run db:migrate -w @vytal-fit/db

      - name: Seed demo data
        run: npm run db:seed -w @vytal-fit/db

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/pro/e2e/html-report/
          retention-days: 14
